<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Couple App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input, button { margin:5px; padding:10px; border-radius:8px; border:none; }
button { background:#ff4d6d; color:white; }
.nav { display:flex; justify-content:space-around; background:#111; padding:10px; position:fixed; bottom:0; width:100%; }
.section { display:none; padding-bottom:80px; }
.active { display:block; }
#buzz { font-size:25px; padding:20px; border-radius:50%; background:#ff1e56; }
.post { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
.chat { text-align:left; margin:10px; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- PROFILE SETUP -->
<div id="profile" style="display:none;">
  <h2>Profile Setup</h2>
  <input id="name" placeholder="Name"><br>
  <input id="rsdate" type="date"><br>
  <button onclick="saveProfile()">Save</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <!-- HOME -->
  <div id="home" class="section active">
    <h2 id="days"></h2>
    <button id="buzz" onclick="sendBuzz()"></button>
  </div>

  <!-- POSTS -->
  <div id="posts" class="section">
    <h3>Posts</h3>
    <input id="postText" placeholder="Write something...">
    <button onclick="addPost()">Post</button>
    <div id="postList"></div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="section">
    <h3>Chat</h3>
    <div id="chatBox"></div>
    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Send</button>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button onclick="show('home')">Home</button>
    <button onclick="show('posts')">Posts</button>
    <button onclick="show('chat')">Chat</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://qmzgwmcdnzfsfqtghkhn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtemd3bWNkbnpmc2ZxdGdoa2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDkzMzAsImV4cCI6MjA5MDk4NTMzMH0.tl3YdHFYufETFO9fXDgGTqPRDUwEuayO1cR04mzRNMM";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let couple_id = null;

// ===== AUTH =====
async function signup(){
  let email = emailEl().value;
  let password = passEl().value;
  let {data} = await sb.auth.signUp({email,password});
  alert("Signup success");
}

async function login(){
  let email = emailEl().value;
  let password = passEl().value;
  let {data} = await sb.auth.signInWithPassword({email,password});
  user = data.user;
  checkUser();
}

// ===== CHECK USER =====
async function checkUser(){
  let {data} = await sb.from("users").select("*").eq("id", user.id).single();

  if(!data){
    showDiv("profile");
  }else{
    couple_id = data.couple_id;
    showApp();
    calcDays(data.rs_start_date);
    loadPosts();
    loadChat();
  }
}

// ===== PROFILE =====
async function saveProfile(){
  let name = val("name");
  let rsdate = val("rsdate");

  await sb.from("users").insert([{
    id:user.id,
    email:user.email,
    name:name,
    rs_start_date:rsdate
  }]);

  showApp();
  calcDays(rsdate);
}

// ===== SHOW APP =====
function showApp(){
  hideAll();
  document.getElementById("app").style.display="block";
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".section").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== DAYS =====
function calcDays(date){
  let d = Math.floor((new Date()-new Date(date))/(1000*60*60*24));
  document.getElementById("days").innerText =
  "We are together for "+d+" days ";
}

// ===== BUZZ =====
async function sendBuzz(){
  await sb.from("buzz").insert([{
    couple_id:couple_id,
    sender_id:user.id
  }]);
  alert("Buzz ");
}

// ===== POSTS =====
async function addPost(){
  let text = val("postText");
  await sb.from("posts").insert([{
    couple_id:couple_id,
    user_id:user.id,
    content:text
  }]);
  loadPosts();
}

async function loadPosts(){
  let {data} = await sb.from("posts").select("*");
  let html="";
  data.forEach(p=>{
    html += `<div class="post">${p.content}</div>`;
  });
  document.getElementById("postList").innerHTML = html;
}

// ===== CHAT =====
async function sendMsg(){
  let text = val("msg");
  await sb.from("messages").insert([{
    couple_id:couple_id,
    sender_id:user.id,
    message:text
  }]);
  loadChat();
}

async function loadChat(){
  let {data} = await sb.from("messages").select("*");
  let html="";
  data.forEach(m=>{
    html += `<div class="chat">${m.message}</div>`;
  });
  document.getElementById("chatBox").innerHTML = html;
}

// ===== HELPERS =====
function val(id){ return document.getElementById(id).value; }
function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("password"); }

function hideAll(){
  document.getElementById("auth").style.display="none";
  document.getElementById("profile").style.display="none";
}

// ===== INIT =====
sb.auth.getUser().then(res=>{
  if(res.data.user){
    user = res.data.user;
    checkUser();
  }
});
</script>

</body>
</html>
